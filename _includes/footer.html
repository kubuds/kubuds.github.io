<!-- Footer -->
<footer>
  <div class="container">
    <div class="row">
      <div class="col-md-4">
        <h3><i class="fa fa-map-marker"></i> {% t footer.contact %}</h3>
        <p class="footer-contact">
          {% t company.name %} <br>
          <!-- Phone: {{ site.telephone_number }} <br>
          Fax: {{ site.fax_number }} <br> -->
          {% t global.email %}: {{ site.company_email }}<br>
        </p>
      </div>
      <div class="col-md-4">
        <h3><i class="fa fa-external-link"></i> {% t footer.link %}</h3>
        <p><a href="{{ site.github_link }}"> {% t global.github %}</a></p>
      </div>
      <div class="col-md-3">
        <h3><i class="fa fa-heart"></i> {% t footer.socialize %}</h3>
        <div class="col-lg-3 col-md-3 col-sm-3 col-xs-12">
          <img src="assets/img/contact/qrcode_wechat_public_account.jpg" width="200%" alt="微信公众号二维码">
          <img class="wechat-logo" src="assets/img/contact/logo_webchat.png" alt="微信logo">
        </div>

          {% if site.googleplus_link %}

          </a>
          {% endif %}

          {% if site.linkedin_link %}

            <i class="fa fa-linkedin-square"></i>
          </a>
          {% endif %}

          {% if site.facebook_link %}

          </a>

          {% if site.facebook_link %}
          <a href="{{ site.facebook_link }}" class="btn-group facebook">
            <i class="fa fa-facebook"></i>
          </a>
          {% endif %}
        </div> -->
      </div>
    </div>
  </div>

  <div class="copyright text center">
    <p>&copy; Copyright {{ site.time | date: '%Y' }}, <a href="#">{{ site.url}}</a>. </p>
  </div>
</footer>
